name: Claude Autofix (Reusable)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  autofix:
    name: Claude Autofix
    # Only run on new issues with the "claude" label, skip if already attempted
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'opened'
      && contains(github.event.issue.labels.*.name, 'claude')
      && !contains(github.event.issue.labels.*.name, 'claude-attempted')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Add claude-attempted label (loop guard)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --add-label "claude-attempted"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          base_branch: main
          branch_prefix: "claude/fix-"
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          prompt: |
            A Railway deployment or health check failure was detected.
            An automated GitHub issue was created with the error details below.

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            --- Issue Body ---
            ${{ github.event.issue.body }}
            --- End Issue Body ---

            Instructions:
            1. Analyze the error logs and service failure details in the issue body
            2. Determine whether this is a CODE issue (bug, missing dependency, bad config file in the repo) or an INFRASTRUCTURE issue (Railway dashboard settings, environment variables, service config, builder settings, DNS, etc.)

            If this is a CODE issue:
            3. Identify the root cause in the codebase
            4. Implement a fix following existing code patterns and conventions
            5. Ensure the fix is minimal and targeted — do not refactor unrelated code
            6. Run any available tests to verify the fix does not break existing functionality
            7. Open a pull request referencing issue #${{ github.event.issue.number }}

            If this is an INFRASTRUCTURE issue (not fixable via code):
            3. Use the gh CLI to comment on issue #${{ github.event.issue.number }} with:
               - A clear explanation of the root cause
               - Step-by-step instructions to resolve it (e.g. Railway dashboard changes, environment variable updates, service configuration fixes)
               - The specific setting or value that needs to change
               Example: gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "..."

            Always take action — either open a PR or comment with guidance. Never exit silently.
          claude_args: "--max-turns 15"
