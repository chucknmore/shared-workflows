name: Railway Monitor (Reusable)

on:
  workflow_call:
    inputs:
      event_name:
        description: "The triggering event name (push or schedule)"
        required: true
        type: string
      deploy_wait_seconds:
        description: "Seconds to wait for Railway to finish building before checking"
        required: false
        type: number
        default: 300
      health_check_interval_minutes:
        description: "Minimum minutes between health checks (0 = run every time)"
        required: false
        type: number
        default: 15
      health_check_urls:
        description: >
          JSON object mapping service names to health-check URLs.
          Example: '{"api":"https://api.example.com/health","frontend":"https://app.example.com"}'
          Omit or pass '{}' to skip HTTP health checks.
        required: false
        type: string
        default: '{}'
    secrets:
      RAILWAY_API_TOKEN:
        required: true
      RAILWAY_PROJECT_ID:
        required: true
      RAILWAY_ENVIRONMENT_ID:
        required: true
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

env:
  RAILWAY_API_URL: https://backboard.railway.com/graphql/v2

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Post-Push Deploy Check
  # Waits for Railway to build, then checks all services for failures
  # ─────────────────────────────────────────────────────────────
  deploy-check:
    name: Post-Push Deploy Check
    if: inputs.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Wait for Railway to build
        run: |
          WAIT=${{ inputs.deploy_wait_seconds }}
          echo "Waiting ${WAIT}s for Railway deploys to complete..."
          sleep "$WAIT"

      - name: Check all services for failures
        id: check-services
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          # Get all services in the project
          QUERY=$(jq -n \
            --arg pid "$RAILWAY_PROJECT_ID" \
            '{query: "query { project(id: \"\($pid)\") { services { edges { node { id name } } } } }"}')

          SERVICES_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$QUERY" \
            "$RAILWAY_API_URL" || echo '{}')

          SERVICES=$(echo "$SERVICES_RESPONSE" | jq -r \
            '.data.project.services.edges[].node | "\(.id)|\(.name)"' 2>/dev/null || echo "")

          FAILED_SERVICES=""
          FAILED_DEPLOYMENT_IDS=""

          while IFS='|' read -r SVC_ID SVC_NAME; do
            [ -z "$SVC_ID" ] && continue

            DEP_QUERY=$(jq -n \
              --arg pid "$RAILWAY_PROJECT_ID" \
              --arg sid "$SVC_ID" \
              --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              '{query: "query { deployments(first: 1, input: { projectId: \"\($pid)\", serviceId: \"\($sid)\", environmentId: \"\($eid)\" }) { edges { node { id status createdAt } } } }"}')

            DEP_RESPONSE=$(curl -sf \
              -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$DEP_QUERY" \
              "$RAILWAY_API_URL" || echo '{}')

            STATUS=$(echo "$DEP_RESPONSE" | jq -r '.data.deployments.edges[0].node.status // empty')
            DEP_ID=$(echo "$DEP_RESPONSE" | jq -r '.data.deployments.edges[0].node.id // empty')

            echo "Service ${SVC_NAME}: ${STATUS}"

            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              FAILED_SERVICES="${FAILED_SERVICES:+${FAILED_SERVICES}, }${SVC_NAME}"
              FAILED_DEPLOYMENT_IDS=$(printf '%s\n%s' "$FAILED_DEPLOYMENT_IDS" "${DEP_ID}:${SVC_NAME}")
            fi
          done <<< "$SERVICES"

          echo "failed_services=${FAILED_SERVICES}" >> "$GITHUB_OUTPUT"
          {
            echo 'failed_deployment_ids<<IDSDELIM'
            echo "${FAILED_DEPLOYMENT_IDS}"
            echo 'IDSDELIM'
          } >> "$GITHUB_OUTPUT"

          if [ -n "$FAILED_SERVICES" ]; then
            echo "::error::Failed services: ${FAILED_SERVICES}"
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "All services healthy"
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch logs for failed services
        id: logs
        if: steps.check-services.outputs.has_failures == 'true'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          FAILED_IDS: ${{ steps.check-services.outputs.failed_deployment_ids }}
        run: |
          ALL_LOGS=""

          while IFS=':' read -r DEP_ID SVC_NAME; do
            [ -z "$DEP_ID" ] && continue
            echo "Fetching logs for ${SVC_NAME} (deployment: ${DEP_ID})"

            # Fetch build logs
            BUILD_QUERY=$(jq -n \
              --arg did "$DEP_ID" \
              '{query: "query { buildLogs(deploymentId: \"\($did)\", limit: 80) { timestamp message severity } }"}')

            BUILD_RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$BUILD_QUERY" \
              "$RAILWAY_API_URL" || echo '{}')

            # Debug: check for API errors
            BUILD_ERRORS=$(echo "$BUILD_RESPONSE" | jq -r '.errors[]?.message // empty' 2>/dev/null)
            if [ -n "$BUILD_ERRORS" ]; then
              echo "::warning::Build logs API error for ${SVC_NAME}: ${BUILD_ERRORS}"
            fi

            BUILD_LOGS=$(echo "$BUILD_RESPONSE" | jq -r \
              '.data.buildLogs[]? | "\(.timestamp) [\(.severity)] \(.message)"' \
              | tail -100 | head -c 10000)

            # Fetch runtime logs
            RUNTIME_QUERY=$(jq -n \
              --arg did "$DEP_ID" \
              '{query: "query { deploymentLogs(deploymentId: \"\($did)\", limit: 80) { timestamp message severity } }"}')

            RUNTIME_RESPONSE=$(curl -s \
              -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$RUNTIME_QUERY" \
              "$RAILWAY_API_URL" || echo '{}')

            # Debug: check for API errors
            RUNTIME_ERRORS=$(echo "$RUNTIME_RESPONSE" | jq -r '.errors[]?.message // empty' 2>/dev/null)
            if [ -n "$RUNTIME_ERRORS" ]; then
              echo "::warning::Runtime logs API error for ${SVC_NAME}: ${RUNTIME_ERRORS}"
            fi

            RUNTIME_LOGS=$(echo "$RUNTIME_RESPONSE" | jq -r \
              '.data.deploymentLogs[]? | "\(.timestamp) [\(.severity)] \(.message)"' \
              | tail -100 | head -c 10000)

            ALL_LOGS="${ALL_LOGS}
          ### ${SVC_NAME}

          **Build Logs:**
          \`\`\`
          ${BUILD_LOGS:-(no build logs)}
          \`\`\`

          **Runtime Logs:**
          \`\`\`
          ${RUNTIME_LOGS:-(no runtime logs)}
          \`\`\`

          ---
          "
          done <<< "$FAILED_IDS"

          {
            echo 'all_logs<<LOGDELIM'
            echo "$ALL_LOGS"
            echo 'LOGDELIM'
          } >> "$GITHUB_OUTPUT"

      - name: Check for duplicate open issue
        id: duplicate-check
        if: steps.check-services.outputs.has_failures == 'true'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          FAILED="${{ steps.check-services.outputs.failed_services }}"
          TITLE="[Railway] ${{ github.event.repository.name }} — Deploy failed: ${FAILED}"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "railway-deploy-failure" \
            --search "[Railway] ${{ github.event.repository.name }} — Deploy failed in:title" \
            --json number \
            --jq ".[0].number // empty" 2>/dev/null || echo "")

          echo "existing_issue=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Write issue body to file
        if: steps.check-services.outputs.has_failures == 'true'
        env:
          FAILED: ${{ steps.check-services.outputs.failed_services }}
          COMMIT_SHA: ${{ github.sha }}
          LOGS: ${{ steps.logs.outputs.all_logs }}
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > /tmp/issue-body.md <<ENDOFBODY
          ## Railway Deploy Failure

          **Service(s):** \`${FAILED}\`
          **Commit:** \`${COMMIT_SHA}\`
          **Detected at:** ${NOW}

          ---

          ${LOGS:-(no logs available)}

          ---

          *Created automatically by railway-monitor workflow. Close this issue once resolved.*
          ENDOFBODY

      - name: Create GitHub Issue
        if: steps.check-services.outputs.has_failures == 'true' && steps.duplicate-check.outputs.existing_issue == ''
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TITLE: ${{ steps.duplicate-check.outputs.title }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --label "railway-deploy-failure,automated,claude" \
            --body-file /tmp/issue-body.md

      - name: Comment on existing issue
        if: steps.check-services.outputs.has_failures == 'true' && steps.duplicate-check.outputs.existing_issue != ''
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ISSUE_NUM: ${{ steps.duplicate-check.outputs.existing_issue }}
        run: |
          gh issue comment "$ISSUE_NUM" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/issue-body.md

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Health Check / Runtime Crash Detection
  # ─────────────────────────────────────────────────────────────
  health-check:
    name: Runtime Health Check
    if: inputs.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Check if health check should run
        id: gate
        run: |
          INTERVAL=${{ inputs.health_check_interval_minutes }}
          MINUTE=$(date -u +%-M)
          if [ "$INTERVAL" -eq 0 ] || [ $((MINUTE % INTERVAL)) -eq 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Health check running (interval: every ${INTERVAL}m)"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping health check (next run at minute divisible by ${INTERVAL})"
          fi

      - name: Check service health
        id: health-check-urls
        if: steps.gate.outputs.should_run == 'true'
        env:
          HEALTH_CHECK_URLS: ${{ inputs.health_check_urls }}
        run: |
          URLS_JSON="${HEALTH_CHECK_URLS:-\{\}}"

          if ! echo "$URLS_JSON" | jq -e 'type == "object"' > /dev/null 2>&1; then
            echo "::error::health_check_urls is not a valid JSON object: ${URLS_JSON}"
            exit 1
          fi

          SERVICE_COUNT=$(echo "$URLS_JSON" | jq 'length')
          echo "Checking ${SERVICE_COUNT} service(s)..."

          ANY_UNHEALTHY=false
          RESULTS=""

          while IFS= read -r SVC_NAME; do
            URL=$(echo "$URLS_JSON" | jq -r --arg k "$SVC_NAME" '.[$k]')

            HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              --max-time 15 \
              "$URL" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ] || \
               [ "$HTTP_STATUS" = "301" ] || \
               [ "$HTTP_STATUS" = "302" ]; then
              IS_HEALTHY=true
              echo "  ${SVC_NAME}: HTTP ${HTTP_STATUS} (healthy)"
            else
              IS_HEALTHY=false
              ANY_UNHEALTHY=true
              echo "::warning::${SVC_NAME} health check FAILED (HTTP ${HTTP_STATUS})"
            fi

            RESULTS="${RESULTS}${SVC_NAME}|${HTTP_STATUS}|${IS_HEALTHY}"$'\n'
          done < <(echo "$URLS_JSON" | jq -r 'keys[]')

          echo "any_unhealthy=${ANY_UNHEALTHY}" >> "$GITHUB_OUTPUT"
          {
            echo 'results<<HEALTHDELIM'
            printf '%s' "$RESULTS"
            echo 'HEALTHDELIM'
          } >> "$GITHUB_OUTPUT"

      - name: Query Railway for crashed services
        id: crashed
        if: steps.health-check-urls.outputs.any_unhealthy == 'true'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
        run: |
          QUERY=$(jq -n \
            --arg pid "$RAILWAY_PROJECT_ID" \
            '{query: "query { project(id: \"\($pid)\") { services { edges { node { id name } } } } }"}')

          SERVICES_RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$QUERY" \
            "$RAILWAY_API_URL" || echo '{}')

          SERVICES=$(echo "$SERVICES_RESPONSE" | jq -r \
            '.data.project.services.edges[].node | "\(.id)|\(.name)"' 2>/dev/null || echo "")

          CRASHED_SERVICE=""
          CRASHED_DEPLOYMENT_ID=""

          while IFS='|' read -r SVC_ID SVC_NAME; do
            [ -z "$SVC_ID" ] && continue

            DEP_QUERY=$(jq -n \
              --arg pid "$RAILWAY_PROJECT_ID" \
              --arg sid "$SVC_ID" \
              --arg eid "$RAILWAY_ENVIRONMENT_ID" \
              '{query: "query { deployments(first: 1, input: { projectId: \"\($pid)\", serviceId: \"\($sid)\", environmentId: \"\($eid)\" }) { edges { node { id status } } } }"}')

            DEP_RESPONSE=$(curl -sf \
              -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$DEP_QUERY" \
              "$RAILWAY_API_URL" || echo '{}')

            STATUS=$(echo "$DEP_RESPONSE" | jq -r '.data.deployments.edges[0].node.status // empty')
            DEP_ID=$(echo "$DEP_RESPONSE" | jq -r '.data.deployments.edges[0].node.id // empty')

            if [ "$STATUS" = "CRASHED" ] || [ "$STATUS" = "FAILED" ]; then
              CRASHED_SERVICE="${SVC_NAME}"
              CRASHED_DEPLOYMENT_ID="${DEP_ID}"
              break
            fi
          done <<< "$SERVICES"

          echo "service=${CRASHED_SERVICE}" >> "$GITHUB_OUTPUT"
          echo "deployment_id=${CRASHED_DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"

      - name: Fetch runtime logs for crashed service
        id: crash-logs
        if: steps.crashed.outputs.deployment_id != ''
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          DEPLOYMENT_ID="${{ steps.crashed.outputs.deployment_id }}"

          QUERY=$(jq -n \
            --arg did "$DEPLOYMENT_ID" \
            '{query: "query { deploymentLogs(deploymentId: \"\($did)\", limit: 100) { timestamp message severity } }"}')

          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${RAILWAY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$QUERY" \
            "$RAILWAY_API_URL" || echo '{}')

          LOGS=$(echo "$RESPONSE" | jq -r \
            '.data.deploymentLogs[]? | "\(.timestamp) [\(.severity)] \(.message)"' \
            | tail -200 | head -c 20000)

          {
            echo 'logs<<LOGDELIM'
            echo "${LOGS:-(no runtime logs available)}"
            echo 'LOGDELIM'
          } >> "$GITHUB_OUTPUT"

      - name: Check for duplicate open issue
        id: duplicate-check
        if: steps.health-check-urls.outputs.any_unhealthy == 'true'
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          HEALTH_RESULTS: ${{ steps.health-check-urls.outputs.results }}
        run: |
          UNHEALTHY=""
          while IFS='|' read -r SVC_NAME _HTTP_STATUS IS_HEALTHY; do
            [ -z "$SVC_NAME" ] && continue
            if [ "$IS_HEALTHY" = "false" ]; then
              UNHEALTHY="${UNHEALTHY:+${UNHEALTHY}, }${SVC_NAME}"
            fi
          done <<< "$HEALTH_RESULTS"

          CRASHED="${{ steps.crashed.outputs.service }}"
          DISPLAY="${CRASHED:-${UNHEALTHY}}"
          echo "display_service=${DISPLAY}" >> "$GITHUB_OUTPUT"

          TITLE="[Railway] ${{ github.event.repository.name }} — Service unhealthy: ${DISPLAY}"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"

          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --label "railway-health-failure" \
            --search "\"${TITLE}\" in:title" \
            --json number \
            --jq ".[0].number // empty" 2>/dev/null || echo "")

          echo "existing_issue=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Write health issue body to file
        if: steps.health-check-urls.outputs.any_unhealthy == 'true'
        env:
          DISPLAY: ${{ steps.duplicate-check.outputs.display_service }}
          HEALTH_RESULTS: ${{ steps.health-check-urls.outputs.results }}
          LOGS: ${{ steps.crash-logs.outputs.logs }}
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          TABLE_ROWS=""
          while IFS='|' read -r SVC_NAME HTTP_STATUS IS_HEALTHY; do
            [ -z "$SVC_NAME" ] && continue
            if [ "$IS_HEALTHY" = "true" ]; then
              ICON=":white_check_mark:"
            else
              ICON=":x:"
            fi
            TABLE_ROWS="${TABLE_ROWS}| ${SVC_NAME} | HTTP ${HTTP_STATUS} | ${ICON} |"$'\n'
          done <<< "$HEALTH_RESULTS"

          cat > /tmp/health-issue-body.md <<ENDOFBODY
          ## Railway Service Health Failure

          **Detected at:** ${NOW}
          **Service(s):** \`${DISPLAY}\`

          ---

          ### Health Check Results

          | Service | HTTP Status | Healthy |
          |---|---|---|
          ${TABLE_ROWS}
          ---

          ### Runtime Logs

          \`\`\`
          ${LOGS:-(no runtime logs available)}
          \`\`\`

          ---

          *Created automatically by railway-monitor workflow. Close this issue once resolved.*
          ENDOFBODY

      - name: Create GitHub Issue
        if: >-
          steps.health-check-urls.outputs.any_unhealthy == 'true'
          && steps.duplicate-check.outputs.existing_issue == ''
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TITLE: ${{ steps.duplicate-check.outputs.title }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --label "railway-health-failure,automated,claude" \
            --body-file /tmp/health-issue-body.md
